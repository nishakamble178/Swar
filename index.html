<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwarSetu — Real-time Sign Language to Text & Voice</title>
    <meta name="description" content="SwarSetu detects hand signs from your camera in real-time and converts them into readable text and natural voice." />
    <meta name="author" content="SwarSetu" />

    <meta property="og:title" content="SwarSetu — Sign Language to Text & Voice" />
    <meta property="og:description" content="Real-time sign language detection. Show a sign, see the text, hear the voice." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script>
      try {
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(t);
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
